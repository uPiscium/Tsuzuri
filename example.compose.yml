services:
  tsuzuri:
    build:
      context: https://github.com/uPiscium/Tsuzuri.git#v0.1.1
    image: tsuzuri:v0.1.1
    container_name: tsuzuri
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request

          urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
